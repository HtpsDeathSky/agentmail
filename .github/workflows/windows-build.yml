name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust workspace
        run: pnpm rust:check

      - name: Test Rust workspace
        run: pnpm rust:test

      - name: Test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri Windows bundles
        uses: tauri-apps/tauri-action@v1
        with:
          tauriScript: pnpm tauri
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: agentmail-windows-[version]-[arch]-[bundle]
