name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust workspace
        run: pnpm rust:check

      - name: Test Rust workspace
        run: pnpm rust:test

      - name: Test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri Windows bundles
        run: pnpm tauri build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v7
        with:
          name: agentmail-windows-bundles
          path: |
            target/release/bundle/**
            src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $assets = Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object { $_.Extension -in ".exe", ".msi" } |
            Select-Object -ExpandProperty FullName
          if (-not $assets) {
            throw "No Windows installer assets found under $bundleRoot"
          }

          $tag = "${{ github.ref_name }}"
          $title = "AgentMail $tag"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $title --notes "Automated Windows installer build for $tag."
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          gh release upload $tag $assets --clobber
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
